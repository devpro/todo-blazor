name: CI
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# description: Continuous Integration pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run-code-quality:
        description: 'Check code quality?'
        required: false
        type: boolean
        default: false
      run-image-scan:
        description: 'Scan container image?'
        required: false
        type: boolean
        default: false

concurrency:
  group: "${{ github.ref }}-ci"
  cancel-in-progress: true

jobs:
  git-check:
    name: Git
    uses: ./.github/workflows/reusable-git-check.yml
    with:
      is-pull-request: ${{ github.event_name == 'pull_request' }}

  content-validate:
    name: Markup
    uses: devpro/github-workflow-parts/.github/workflows/reusable-markup-lint.yml@79ef8b68e376c0cb3df0fc82e25961cc649023db

  code-quality:
    name: Code
    needs: git-check
    if: needs.git-check.outputs.app_changed == 'true' || (github.event_name == 'workflow_dispatch' && inputs.run-code-quality)
    uses: devpro/github-workflow-parts/.github/workflows/reusable-dotnet-quality.yml@79ef8b68e376c0cb3df0fc82e25961cc649023db
    with:
      custom-commands: |
        echo "Install Playwright browser (chromium)"
        dotnet build --no-restore --configuration Debug test/BlazorApp.PlaywrightTests
        pwsh test/BlazorApp.PlaywrightTests/bin/Debug/net10.0/playwright.ps1 install chromium
        echo "Install and start MongoDB 8.2"
        curl -fsSL https://www.mongodb.org/static/pgp/server-8.0.asc | \
          sudo gpg -o /usr/share/keyrings/mongodb-server-8.0.gpg \
          --dearmor
        echo "deb [ arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-8.0.gpg ] https://repo.mongodb.org/apt/ubuntu noble/mongodb-org/8.2 multiverse" |
          sudo tee /etc/apt/sources.list.d/mongodb-org-8.2.list
        sudo apt-get update
        sudo apt-get install -y mongodb-org
        sudo systemctl start mongod
        timeout 30 bash -c "
          until mongosh --host localhost:27017 --eval 'db.runCommand({ ping: 1 })' >/dev/null 2>&1; do
            echo 'MongoDB not ready yet, retrying in 1 second...'
            sleep 1
          done
        "
      dotnet-test-args: "--report-xunit-trx --coverage --coverage-output-format cobertura"
      extra-vars: |
        Application__IsHttpsRedirectionEnabled="false"
      fossa-enabled: false
      sonar-enabled: true
      sonar-organization: ${{ vars.SONAR_ORG }}
      sonar-project-key: ${{ vars.SONAR_PROJECT_KEY }}
      sonar-project-name: Todo Blazor
    secrets:
      fossa-api-key: ${{ secrets.FOSSA_API_KEY }}
      sonar-token: ${{ secrets.SONAR_TOKEN }}
    permissions:
      contents: read
      pull-requests: write

  image-scan:
    name: Image
    needs: git-check
    if: needs.git-check.outputs.app_changed == 'true' || (github.event_name == 'workflow_dispatch' && inputs.run-image-scan)
    uses: devpro/github-workflow-parts/.github/workflows/reusable-container-scan.yml@79ef8b68e376c0cb3df0fc82e25961cc649023db
    with:
      image-definition: "src/BlazorApp/Dockerfile"
      image-name: ${{ vars.CONTAINER_IMAGE_NAME }}
      image-path: ${{ vars.CONTAINER_REGISTRY_PATH }}
      image-tag: "${{ needs.git-check.outputs.version_major_minor }}.${{ github.run_id }}"
